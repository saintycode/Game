<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Village Building Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to the Simple Village Building Game</h1>
    <div id="resources">
        <h2>Resources</h2>
        <p id="wood">Wood: 0</p>
        <p id="stone">Stone: 0</p>
        <p id="food">Food: 0</p>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="building-cards">
        <h2>Building Cards</h2>
        <div class="building-card">
            <h3>House</h3>
            <p>Cost: 10 Wood, 5 Stone</p>
            <p id="house-count">Built: 0</p>
            <button id="build-house">Build</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
