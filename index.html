<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Village Building Game</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        #canvas { border: 1px solid #000; display: block; margin: 20px auto; }
        #resources { text-align: center; margin: 20px; }
        .building-card { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Welcome to the Simple Village Building Game</h1>
    <div id="resources">
        <h2>Resources</h2>
        <p id="wood">Wood: 0</p>
        <p id="stone">Stone: 0</p>
        <p id="food">Food: 0</p>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="building-cards">
        <h2>Building Cards</h2>
        <div class="building-card">
            <h3>House</h3>
            <p>Cost: 10 Wood, 5 Stone</p>
            <button>Build</button>
        </div>
        <div class="building-card">
            <h3>Farm</h3>
            <p>Cost: 15 Wood, 7 Stone</p>
            <button>Build</button>
        </div>
    </div>
    <script>
        // JavaScript for game logic will go here
    </script>
</body>
</html>
